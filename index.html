<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    
    <!--set- componente js -->
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <!-- enviroment A-Frame https://aframe.io/docs/1.7.0/guides/building-a-basic-scene.html#creating-a-custom-environment-optional) -->
    <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
  </head>

  <body>
    <a-scene>

      <a-assets>
      <audio id="river" src="som/Som.mp3" preload="auto"></audio>
      <img id="sky" src="imagens/2019_07_05_Armazones_Inside_Crater_Pano_24mm_EQ_CC.jpg">
       
       <video id="cataratas" autoplay loop="true" src="videos/cataratas.mp4"></video>
      
    </a-assets>
    
      <!-- primitivo sky no A-Frame -->
      <a-entity environment="preset: yavapai; dressingAmount: 500"></a-entity>

      <!-- som sem autolay, loop e volume não toca -->
      <a-entity sound="src: #river; autoplay: true; loop: true; volume:1"></a-entity>
      
    <!--plane color="#2160ff" height="20" width="20" rotation="-90 0 0" material="color:#2160ff; side:double" ></a-plane>-->

     <a-video src="#cataratas" width="16" height="9" position="0 2 -6"></a-video>
      
    <a-box id="cubo" class="clickable"
      position="-1 0.5 -3"
      color="#19d1d4"
      depth="1"
      height="1"
      width="1"
      animation=" property: position; to: -1 1 -3; dur: 2500; loop:true"
      animation__enter="property: rotation; to: 0 45 0; dur: 500; startEvents: mouseenter"
      animation__leave="property: rotation; to: 0 0 0; dur: 500; startEvents: mouseleave"
      event-set__enter="_event: mouseenter; color: #8FF7FF"
      event-set__leave="_event: mouseleave; color: #4CC3D9">
    </a-box>

     <a-cylinder id="cilindro" position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"
      event-set__enter="_event: mouseenter; _target: #cubo; visible: true"
      event-set__leave="_event: mouseleave; _target: #cubo; visible: false">
     </a-cylinder>
    
    <!-- verificar click no raycaster dos docs do A-Frame -->
    <a-entity  class="clickable" id="circulo" geometry="primitive: circle; radius: 1" material="side: double"  position="-4 1 -4" 
        event-set__enter="_event: click; _target: #cilindro; color:#4287f5"
        event-set__leave="_event: click; _target: #cilindro; color:#42f557">
  
    ></a-entity>

    <!-- o VR adiciona a altura do jogador por isso temnos de colocar o y do rig(RV) e a camara - PC - comom parent com o y a 1.6-->   
  <a-entity id="rig" position="0 0 0">
  <a-entity id="camera" camera look-controls wasd-controls position="0 1.6 0">
    <a-entity meta-touch-controls="hand: left"></a-entity>
  <a-entity meta-touch-controls="hand: right"></a-entity>
        <a-entity cursor="fuse: true; fuseTimeout: 1500"
                  raycaster="objects: .clickable"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                  material="color: black; shader: flat">
        </a-entity>


</a-entity>
</a-entity>


    </a-scene>
  </body>
</html>
