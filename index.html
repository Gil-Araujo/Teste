<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  </head>

  <body>
    <a-scene>
      
      <a-sky color="#32a852"></a-sky>
      <a-plane color="#2160ff" height="20" width="20" rotation="-90 0 0" material="color:#2160ff; side:double" ></a-plane>
      <a-box position="-1 0.5 -3" color="#19d1d4" depth="1" height="1" width="1"
      animation="property: position; to: -1 1 -3; dur: 2000; easing: linear; loop: true"
      
      event-set__enter="_event: mouseenter; color: #8FF7FF"
      event-set__leave="_event: mouseleave; color: #4CC3D9"
      
      >
    </a-box>
      
<a-entity id="rig" position="0 1.6 0">
  <a-entity id="camera" camera look-controls wasd-controls >
  
        <a-entity cursor="fuse: true; fuseTimeout: 500"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: black; shader: flat">
        </a-entity>

</a-entity>
</a-entity>
</a-entity>

    </a-scene>
  </body>
</html>
